<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">Mission Control Customer Operations Runtime Infographic</title>
  <desc id="desc">A visual flow showing customer request intake through runtime decision, review, execution guard, receipt, replay, audit trail, and operations dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="58%" stop-color="#0d1728"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8d987"/>
      <stop offset="100%" stop-color="#b8892f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 700 18px Arial, sans-serif; fill: #f8fafc; }
      .small { font: 400 14px Arial, sans-serif; fill: #cbd5e1; }
      .tiny { font: 700 12px Arial, sans-serif; fill: #111827; letter-spacing: .08em; }
      .node { fill: #111827; stroke: #334155; stroke-width: 2; rx: 22; filter: url(#shadow); }
      .guard { fill: #1a1427; stroke: #b8892f; stroke-width: 2; rx: 22; filter: url(#shadow); }
      .line { stroke: #64748b; stroke-width: 4; stroke-linecap: round; }
      .arrow { fill: #64748b; }
      .pill { fill: url(#gold); }
      .pillBlue { fill: url(#blue); }
    </style>
  </defs>

  <rect width="1400" height="720" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="260" fill="#1d4ed8" opacity="0.08"/>
  <circle cx="260" cy="620" r="280" fill="#f59e0b" opacity="0.07"/>

  <text x="70" y="80" class="title">Mission Control</text>
  <text x="70" y="116" class="subtitle">Customer Operations Runtime</text>
  <text x="70" y="154" class="small">Intake → evaluation → review → controlled execution → receipt → replay → audit evidence</text>

  <rect x="1040" y="58" width="285" height="46" rx="23" class="pill"/>
  <text x="1070" y="87" class="tiny">FAIL-CLOSED RUNTIME</text>

  <g transform="translate(65,235)">
    <rect class="node" x="0" y="0" width="150" height="118"/>
    <text class="label" x="24" y="42">Dashboard</text>
    <text class="small" x="24" y="72">operator view</text>
    <text class="small" x="24" y="94">customer state</text>
  </g>

  <g transform="translate(245,235)">
    <rect class="node" x="0" y="0" width="160" height="118"/>
    <text class="label" x="24" y="42">Request</text>
    <text class="small" x="24" y="72">intake envelope</text>
    <text class="small" x="24" y="94">business context</text>
  </g>

  <g transform="translate(435,235)">
    <rect class="guard" x="0" y="0" width="185" height="118"/>
    <text class="label" x="24" y="42">Runtime Gate</text>
    <text class="small" x="24" y="72">authority / scope</text>
    <text class="small" x="24" y="94">evidence / risk</text>
  </g>

  <g transform="translate(650,235)">
    <rect class="node" x="0" y="0" width="160" height="118"/>
    <text class="label" x="24" y="42">Review</text>
    <text class="small" x="24" y="72">approve / hold</text>
    <text class="small" x="24" y="94">escalate / refuse</text>
  </g>

  <g transform="translate(840,235)">
    <rect class="guard" x="0" y="0" width="180" height="118"/>
    <text class="label" x="24" y="42">Execution</text>
    <text class="small" x="24" y="72">guarded release</text>
    <text class="small" x="24" y="94">blocked if unsafe</text>
  </g>

  <g transform="translate(1050,235)">
    <rect class="node" x="0" y="0" width="150" height="118"/>
    <text class="label" x="24" y="42">Receipt</text>
    <text class="small" x="24" y="72">stable hash</text>
    <text class="small" x="24" y="94">replay token</text>
  </g>

  <g transform="translate(1230,235)">
    <rect class="node" x="0" y="0" width="120" height="118"/>
    <text class="label" x="24" y="42">Audit</text>
    <text class="small" x="24" y="72">trail</text>
    <text class="small" x="24" y="94">evidence</text>
  </g>

  <path class="line" d="M215 294 H245"/><polygon class="arrow" points="245,294 232,286 232,302"/>
  <path class="line" d="M405 294 H435"/><polygon class="arrow" points="435,294 422,286 422,302"/>
  <path class="line" d="M620 294 H650"/><polygon class="arrow" points="650,294 637,286 637,302"/>
  <path class="line" d="M810 294 H840"/><polygon class="arrow" points="840,294 827,286 827,302"/>
  <path class="line" d="M1020 294 H1050"/><polygon class="arrow" points="1050,294 1037,286 1037,302"/>
  <path class="line" d="M1200 294 H1230"/><polygon class="arrow" points="1230,294 1217,286 1217,302"/>

  <g transform="translate(105,430)">
    <rect x="0" y="0" width="1190" height="170" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="34" y="48" class="label">Core outcomes</text>
    <rect x="34" y="72" width="160" height="50" rx="25" class="pillBlue"/>
    <text x="78" y="103" class="tiny">ADMIT</text>
    <rect x="230" y="72" width="160" height="50" rx="25" fill="#facc15"/>
    <text x="282" y="103" class="tiny">HOLD</text>
    <rect x="426" y="72" width="160" height="50" rx="25" fill="#fb923c"/>
    <text x="463" y="103" class="tiny">ESCALATE</text>
    <rect x="622" y="72" width="160" height="50" rx="25" fill="#ef4444"/>
    <text x="670" y="103" class="tiny">REFUSE</text>
    <text x="832" y="88" class="small">Every material action is tenant-scoped, reviewed when required,</text>
    <text x="832" y="112" class="small">receipt-backed, replayable, and auditable.</text>
  </g>

  <text x="70" y="666" class="small">Production posture: trusted ingress required · explicit tenant id required · unsafe production config rejected · no protected effect on REFUSE</text>
</svg>
