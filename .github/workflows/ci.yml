name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/mission_control_ci.db
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Apply database migration
        run: |
          rm -f /tmp/mission_control_ci.db
          python -m alembic upgrade head
      - name: Run backend tests
        run: |
          set +e
          PYTHONPATH=. python -m pytest -q --tb=short | tee /tmp/backend-pytest.log
          test_status=${PIPESTATUS[0]}
          exit ${test_status}
      - name: Upload backend pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-log
          path: /tmp/backend-pytest.log

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production compose file
        env:
          POSTGRES_PASSWORD: ci-placeholder
          AUTH_TOKEN_SECRET: 0123456789abcdef0123456789abcdef
          NEXT_PUBLIC_API_BASE: https://api.example.com
          CORS_ALLOW_ORIGINS: https://app.example.com
        run: docker compose -f docker-compose.prod.yml config
