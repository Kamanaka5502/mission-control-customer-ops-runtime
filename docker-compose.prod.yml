services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mission_control
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - mission_control_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_control -d mission_control"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_MODE: customer-operations-platform
      REQUIRE_TENANT_HEADER: "true"
      DATABASE_URL: postgresql+psycopg://mission_control:${POSTGRES_PASSWORD}@postgres:5432/mission_control
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?NEXT_PUBLIC_API_BASE is required}
    depends_on:
      - api

volumes:
  mission_control_pgdata:
