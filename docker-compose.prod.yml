services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: mission_control
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - mission_control_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_control -d mission_control"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_ENV: production
      APP_MODE: customer-operations-platform
      REQUIRE_TENANT_HEADER: "true"
      REQUIRE_TRUSTED_INGRESS: "true"
      AUTH_REQUIRED: "true"
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      RECEIPT_SIGNING_SECRET: ${RECEIPT_SIGNING_SECRET:?RECEIPT_SIGNING_SECRET is required}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:?CORS_ALLOW_ORIGINS is required}
      DATABASE_URL: postgresql+psycopg://mission_control:${POSTGRES_PASSWORD}@postgres:5432/mission_control
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-262144}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-120}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      TRUSTED_RATE_LIMIT_HEADER: ${TRUSTED_RATE_LIMIT_HEADER:-x-rate-limit-client}
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:?NEXT_PUBLIC_API_BASE is required}
    depends_on:
      - api
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  mission_control_pgdata:
